name: CI (Alpine)

on:
  push:
    branches:
      - master
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

jobs:
  alpine:

    strategy:
      fail-fast: false
      matrix:
        include:
        - alpine: 'edge'
#        - alpine: 'latest-stable'

    runs-on: ubuntu-latest
    name: alpine-${{ matrix.alpine }}

    concurrency:
      group: ${{ github.workflow }}-alpine-${{ matrix.alpine }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
    - uses: jirutka/setup-alpine@v1
      with:
        branch: ${{ matrix.alpine }}
        extra-repositories: https://dl-cdn.alpinelinux.org/alpine/edge/testing
        packages: make rocq rocq-stdlib doas-sudo-shim
    - name: echo Require Bool. | coqtop
      run: echo Require Bool. | coqtop
      continue-on-error: true
      id: require_bool
    - name: TIMED=1 make -j "$(nproc)" -k
      if: steps.require_bool.outcome == 'success'
      shell: alpine.sh {0}
      run: TIMED=1 make -j "$(nproc)" -k
    - name: sudo make install
      if: steps.require_bool.outcome == 'success'
      shell: alpine.sh {0}
      run: sudo make install
